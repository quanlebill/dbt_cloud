models:
  - name: mart__countries
    semantic_model:
      enabled: true
      name: countries_standard_name_and_code
    columns:
      - name: country_name
        entity:
          name: country_name
          type: primary

      - name: iso_alpha_2_code
        entity:
          name: iso_alpha_2_code
          type: unique
      - name: iso_alpha_3_code
        entity:
            name: iso_alpha_3_code
            type: unique


  - name: mart__standard_year
    description: time spine yearly
    time_spine:
      standard_granularity_column: order_year
    columns:
      - name: order_year
        granularity: year

  - name: mart__gdp
    semantic_model:
      enabled: true
      name: gdp_table

    columns:
      - name: gdp_pii
        entity:
          name: gdp_pii
          type: primary
      - name: country_name
        entity:
          name: country_name
          type: foreign

      - name: order_year
        granularity: year
        dimension:
          type: time

      - name: type
        dimension:
          type: categorical

    metrics:
      - name: average_gdp_nominal
        type: simple
        agg: average
        expr: gdp_nominal
        join_to_timespine: true
        agg_time_dimension: order_year

      - name: average_gdp_growth
        type: simple
        agg: average
        expr: gdp_growth
        join_to_timespine: true
        agg_time_dimension: order_year

      - name: average_gdp_ppp
        type: simple
        agg: average
        expr: gdp_ppp
        join_to_timespine: true
        agg_time_dimension: order_year

      - name: average_gdp_nominal_per_capita
        type: simple
        agg: average
        expr: gdp_nominal_per_capita
        join_to_timespine: true
        agg_time_dimension: order_year

      - name: average_gdp_ppp_per_capita
        type: simple
        agg: average
        expr: gdp_ppp_per_capita
        join_to_timespine: true
        agg_time_dimension: order_year

      - name: average_gdp_real
        type: simple
        agg: average
        expr: gdp_real
        join_to_timespine: true
        agg_time_dimension: order_year

