models:
  - name: pp_fred__inflation
    description: Monthly inflation metrics from 7 FRED series joined on observation_date
    columns:
      - name: observation_date
      - name: cpi_level
      - name: core_cpi_level
      - name: pce_level
      - name: core_pce_level
      - name: trimmed_mean_pce_yoy
      - name: median_cpi_yoy
      - name: ppi_level

  - name: pp_fred__fed_funds_daily
    description: Daily fed funds effective rate with FOMC target corridor
    columns:
      - name: observation_date
      - name: fed_funds_rate
      - name: target_lower
      - name: target_upper

  - name: pp_fred__fed_funds_monthly
    description: Monthly fed funds effective rate (separate from daily)
    columns:
      - name: observation_date
      - name: fed_funds_rate

  - name: pp_fred__nonfarm_payrolls
    description: Monthly total nonfarm payrolls level
    columns:
      - name: observation_date
      - name: payrolls_level

  - name: pp_fred__consumer_sentiment
    description: Monthly University of Michigan Consumer Sentiment Index
    columns:
      - name: observation_date
      - name: consumer_sentiment

  - name: pp_fred__yield_curve
    description: Daily Treasury yield curve (8 maturities) with 10Y-2Y and 10Y-3M spreads
    columns:
      - name: observation_date
      - name: y1m
      - name: y3m
      - name: y6m
      - name: y1
      - name: y2
      - name: y5
      - name: y10
      - name: y30
      - name: spread_10y_2y
      - name: spread_10y_3m
