version: 2

models:
  # ── CPI / Inflation ───────────────────────────────────────────────────────────
  - name: stg_fred__cpi
    description: CPI Headline monthly level standardized to month-start date
    columns:
      - name: country_name
        data_tests: [not_null]
      - name: observation_date
        data_tests: [not_null, unique]
      - name: cpi_level
        data_tests: [not_null]

  - name: stg_fred__core_cpi
    description: Core CPI monthly level standardized to month-start date
    columns:
      - name: country_name
        data_tests: [not_null]
      - name: observation_date
        data_tests: [not_null, unique]
      - name: core_cpi_level
        data_tests: [not_null]

  - name: stg_fred__pce
    description: PCE Headline monthly level standardized to month-start date
    columns:
      - name: country_name
        data_tests: [not_null]
      - name: observation_date
        data_tests: [not_null, unique]
      - name: pce_level
        data_tests: [not_null]

  - name: stg_fred__core_pce
    description: Core PCE monthly level standardized to month-start date
    columns:
      - name: country_name
        data_tests: [not_null]
      - name: observation_date
        data_tests: [not_null, unique]
      - name: core_pce_level
        data_tests: [not_null]

  - name: stg_fred__trimmed_mean_pce
    description: Trimmed Mean PCE 12-month YoY rate standardized to month-start date
    columns:
      - name: country_name
        data_tests: [not_null]
      - name: observation_date
        data_tests: [not_null, unique]
      - name: trimmed_mean_pce_yoy
        data_tests: [not_null]

  - name: stg_fred__median_cpi
    description: Median CPI YoY rate standardized to month-start date
    columns:
      - name: country_name
        data_tests: [not_null]
      - name: observation_date
        data_tests: [not_null, unique]
      - name: median_cpi_yoy
        data_tests: [not_null]

  - name: stg_fred__ppi
    description: PPI All Commodities monthly level standardized to month-start date
    columns:
      - name: country_name
        data_tests: [not_null]
      - name: observation_date
        data_tests: [not_null, unique]
      - name: ppi_level
        data_tests: [not_null]

  # ── Fed Funds Interest Rates ──────────────────────────────────────────────────
  - name: stg_fred__fed_funds_monthly
    description: Federal Funds Effective Rate monthly average
    columns:
      - name: country_name
        data_tests: [not_null]
      - name: observation_date
        data_tests: [not_null, unique]
      - name: fed_funds_rate
        data_tests: [not_null]

  - name: stg_fred__fed_funds_daily
    description: Federal Funds Effective Rate daily
    columns:
      - name: country_name
        data_tests: [not_null]
      - name: observation_date
        data_tests: [not_null, unique]
      - name: fed_funds_rate
        data_tests: [not_null]

  - name: stg_fred__fed_funds_target_lower
    description: FOMC target rate lower bound daily (dfedtarl)
    columns:
      - name: country_name
        data_tests: [not_null]
      - name: observation_date
        data_tests: [not_null, unique]
      - name: target_lower
        data_tests: [not_null]

  - name: stg_fred__fed_funds_target_upper
    description: FOMC target rate upper bound daily (dfedtaru)
    columns:
      - name: country_name
        data_tests: [not_null]
      - name: observation_date
        data_tests: [not_null, unique]
      - name: target_upper
        data_tests: [not_null]

  # ── Non-Farm Payroll ──────────────────────────────────────────────────────────
  - name: stg_fred__nonfarm_payrolls
    description: Total nonfarm payrolls monthly level
    columns:
      - name: country_name
        data_tests: [not_null]
      - name: observation_date
        data_tests: [not_null, unique]
      - name: payrolls_level
        data_tests: [not_null]

  # ── Consumer Confidence ───────────────────────────────────────────────────────
  - name: stg_fred__consumer_sentiment
    description: University of Michigan Consumer Sentiment Index monthly
    columns:
      - name: country_name
        data_tests: [not_null]
      - name: observation_date
        data_tests: [not_null, unique]
      - name: consumer_sentiment
        data_tests: [not_null]

  # ── Yield Curve (daily) ───────────────────────────────────────────────────────
