models:
  # ── mart__inflation ─────────────────────────────────────────────────────────
  - name: mart__inflation
    semantic_model:
      enabled: true
      name: inflation_table

    columns:
      - name: inflation_pii
        entity:
          name: inflation_pii
          type: primary

      - name: observation_date
        granularity: month
        dimension:
          type: time
        config:
          meta:
            unit: month

    metrics:
      - name: average_cpi_level
        type: simple
        agg: average
        expr: cpi_level
        join_to_timespine: true
        agg_time_dimension: observation_date
        config:
          meta:
            unit: "Index 1982-1984=100"

      - name: average_core_cpi_level
        type: simple
        agg: average
        expr: core_cpi_level
        join_to_timespine: true
        agg_time_dimension: observation_date
        config:
          meta:
            unit: "Index 1982-1984=100"

      - name: average_pce_level
        type: simple
        agg: average
        expr: pce_level
        join_to_timespine: true
        agg_time_dimension: observation_date
        config:
          meta:
            unit: "Index 2017=100"

      - name: average_core_pce_level
        type: simple
        agg: average
        expr: core_pce_level
        join_to_timespine: true
        agg_time_dimension: observation_date
        config:
          meta:
            unit: "Index 2017=100"

      - name: average_trimmed_mean_pce_yoy
        type: simple
        agg: average
        expr: trimmed_mean_pce_yoy
        join_to_timespine: true
        agg_time_dimension: observation_date
        config:
          meta:
            unit: "%"

      - name: average_median_cpi_yoy
        type: simple
        agg: average
        expr: median_cpi_yoy
        join_to_timespine: true
        agg_time_dimension: observation_date
        config:
          meta:
            unit: "%"

      - name: average_ppi_level
        type: simple
        agg: average
        expr: ppi_level
        join_to_timespine: true
        agg_time_dimension: observation_date
        config:
          meta:
            unit: "Index 1982=100"

